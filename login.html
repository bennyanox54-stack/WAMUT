<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" style="width:100%; padding:10px; margin-bottom:10px;" required><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" style="width:100%; padding:10px; margin-bottom:10px;" required><br>
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" style="width:100%; padding:10px; margin-bottom:10px;" required><br>
        <label for="gender">Gender:</label><br>


        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label><br><br>
        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" style="width:100%; padding:10px; margin-bottom:10px;" required><br>
        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="4" style="width:100%; padding:10px; margin-bottom:10px;"
            required></textarea><br>
        <label for="city">City:</label><br>
        <input type="text" id="city" name="city" style="width:100%; padding:10px; margin-bottom:10px;" required><br>
        <label for="file">Upload a passport photo:</label><br>
        <label for="file">upload your birth certificate:</label>
        <input type="file" id="file" name="file" accept="image/*" style="width:100%; padding:10px; margin-bottom:10px;"
            required><br>
        <input type="file" id="file" name="file" accept="image/*" style="width:100%; padding:10px; margin-bottom:10px;"
            required><br>
        <lable for="file">upload your national ID: </lable>
        <input type="file" id="file" name="file" accept="image/*" style="width:100%; padding:10px; margin-bottom:10px;"
            required><br>
        <label for="file">upload your KCPE certificate:</label>
        <input type="file" id="file" name="file" accept="image/*" style="width:100%; padding:10px; margin-bottom:10px;"
            required><br>
        <label for="file">upload your KCSE certificate:</label>
        <input type="file" id="file" name="file" accept="image/*" style="width:100%; padding:10px; margin-bottom:10px;"
            required><br>
        <label for="file">upload your academic transcript:</label>
        <input type="file" id="file" name="file" accept="image/*" style="width:100%; padding:10px; margin-bottom:10px;"
            required><br>
        <label for="file">upload your recommendation letter:</label>
        <input type="file" id="file" name="file" accept="image/*" style="width:100%; padding:10px; margin-bottom:10px;"
            required><br>









        <label for="program">Select Program:</label><br>
        <select id="program" name="program" style="width:100%; padding:10px; margin-bottom:10px;" required>
            <option value="computer_science">Computer Science</option>
            <option value="business_management">Business Management</option>
            <option value="engineering">Engineering</option>
        </select><br>

        <label for="payment">Payment Method:</label><br>
        <select id="payment" name="payment" style="width:100%; padding:10px; margin-bottom:10px;" required>
            <option value="credit_card">Credit Card</option>
            <option value="debit_card">Debit Card</option>
            <option value="bank_transfer">Bank Transfer</option>
            <option value="mobile_payment">Mobile Payment</option>
        </select><br>
        <label for="payment_proof">Upload Payment Proof:</label><br>
        <input type="file" id="payment_proof" name="payment_proof" accept="image/*"
            style="width:100%; padding:10px; margin-bottom:10px;" required><br>
        <button type="submit" style="width:100%; padding:10px; background:#2c3e50; color:white;">
            Submit
        </button>
        <a
            href="requrements.html">click here to download the requrements for the application</a><br><br>
        </a>


    </form>
    

</body>

</html>
